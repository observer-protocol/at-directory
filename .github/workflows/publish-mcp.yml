name: publish-mcp

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # Gate: the full CI must pass before anything publishes.
      - run: pnpm -r lint
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm validate-data

      # Bundle (core inlined, plain JS) and publish to npm from dist/.
      - run: pnpm -F @agenticterminal/mcp-server build
      - run: cd packages/mcp-server/dist && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Build + push the hosted image to GHCR.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/mcp-server/Dockerfile
          push: true
          tags: |
            ghcr.io/observer-protocol/at-directory-mcp:latest
            ghcr.io/observer-protocol/at-directory-mcp:${{ github.ref_name }}

      # Redeploy on op-vps if the deploy key is configured. Skipped
      # automatically until the secret exists (DNS/host not ready yet).
      - name: Redeploy op-vps
        if: ${{ secrets.OP_VPS_SSH_KEY != '' }}
        run: |
          install -m600 /dev/stdin "$HOME/k" <<< "${{ secrets.OP_VPS_SSH_KEY }}"
          ssh -o StrictHostKeyChecking=accept-new -i "$HOME/k" \
            deploy@178.156.249.143 \
            'docker pull ghcr.io/observer-protocol/at-directory-mcp:latest && sudo systemctl restart at-directory-mcp'
