[build]
  base = "/"
  command = "pnpm install && pnpm -F @at-directory/web build && pnpm -F @at-directory/web bundle:data"
  publish = "apps/web/out"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[functions]
  directory = "apps/web/netlify/functions"
  node_bundler = "esbuild"

# SKILL.md is emitted directly to out/SKILL.md by the bundle:data step,
# so it is served at /SKILL.md with no redirect needed.

# Maxi's prior scraped feed: audited before launch; load-bearing inbound
# links (if any) get explicit redirects added here before any catch-all.
